<!-- personal-assistant-frontend/src/app/components/register/register.component.html -->
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="card max-w-md w-full">
      <!-- Swan Logo -->
      <div class="text-center mb-8">
        <div class="inline-block text-7xl mb-4">🦢</div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-pink-500 to-orange-500 bg-clip-text text-transparent">
          Join Villanelle 
        </h1>
        <p class="text-gray-500 mt-2">get assisted, don't overthink your ambitions</p>
      </div>
  
      <!-- Register Form -->
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
          <input 
            type="text" 
            [(ngModel)]="username" 
            name="username"
            class="input-field"
            placeholder="Choose a username"
            required
          />
        </div>
  
  
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password"
            class="input-field"
            placeholder="••••••••"
            required
          />
        </div>
  
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
          <input 
            type="password" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword"
            class="input-field"
            placeholder="••••••••"
            required
          />
        </div>
  
        <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-2xl text-sm">
          {{ error }}
        </div>
  
        <button 
          type="submit" 
          class="btn-primary w-full"
          [disabled]="loading"
        >
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>
  
      <div class="mt-6 text-center">
        <p class="text-gray-600">
          Already have an account? 
          <a routerLink="/login" class="text-pink-500 font-medium hover:text-pink-600">Sign in</a>
        </p>
      </div>
    </div>
  </div>
